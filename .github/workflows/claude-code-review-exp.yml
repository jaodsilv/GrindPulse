name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code CI Fix
        id: claude-fix-ci
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: |
            https://github.com/jaodsilv/claudius.git
          plugins: |
            gitx@jaodsilv-claudius-marketplace
          prompt: |
            This is Test.
            Just respond if you have access to ci results.
            repo: ${{ github.repository }}
            pr: ${{ github.event.pull_request.number }}

          # /gitx:address-ci --repo ${{ github.repository }} --pr ${{ github.event.pull_request.number }} --ci-mode ${{ github.job }}
          track_progress: true # ✨ Enables tracking comments
          # additional_permissions: |
          # contents: write
          # actions: read
          # checks: read
          # pull-requests: write
          claude_args: |
            --allowedTools "Agent,Skill,TaskCreate,TaskUpdate,Read,Write,Grep,Glob,Bash(git -C *),Bash(*scripts/commits/commit-push-execute.sh *),Bash(git diff *),Bash(git log *)"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            https://github.com/jaodsilv/claudius.git
          plugins: |
            gitx@jaodsilv-claudius-marketplace
            superpowers@claude-plugins-official
            pr-review-toolkit@claude-plugins-official
          prompt: |
            This is Test, do nothing, just complete with success
          track_progress: true # ✨ Enables tracking comments
          # additional_permissions: |
          # pull-requests: write
          claude_args: |
            --allowedTools "Skill,Bash(gh pr review *),mcp__github_inline_comment__create_inline_comment,Read,Bash(gh pr view *),Task,Grep,Glob,Agent,Write,TaskCreate,TaskUpdate,TaskGet,Bash(git diff *),Bash(git log *)"
