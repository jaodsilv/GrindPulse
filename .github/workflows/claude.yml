name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment'
        && contains(github.event.comment.body, '@claude')
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment'
        && contains(github.event.comment.body, '@claude')
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review'
        && contains(github.event.review.body, '@claude')
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues'
        && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))
        && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      actions: read
      checks: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            https://github.com/jaodsilv/claudius.git
          plugins: |
            cc@jaodsilv-claudius-marketplace
            gitx@jaodsilv-claudius-marketplace
            planner@jaodsilv-claudius-marketplace
            brainstorm@jaodsilv-claudius-marketplace
            superpowers@claude-plugins-official
            pr-review-toolkit@claude-plugins-official
          track_progress: true # ✨ Enables tracking comments
          claude_args: |
            --allowedTools "mcp__github_ci__get_ci_status,mcp__github_ci__get_workflow_run_details,mcp__github_ci__download_job_log,Agent,Skill,TaskCreate,TaskUpdate,Read,Grep,Glob,Bash(git diff *),Bash(git log *),Bash(gh pr review *),mcp__github_inline_comment__create_inline_comment,Bash(gh pr view *),Task,TaskGet,mcp__github__pull_request_read,mcp__github__list_pull_requests,mcp__github__search_pull_requests,mcp__github__request_copilot_review,mcp__github__pull_request_review_write,mcp__github__add_comment_to_pending_review,mcp__github__add_reply_to_pull_request_comment,mcp__github__issue_read,mcp__github__add_issue_comment,mcp__github__list_issues,mcp__github__search_issues,mcp__github__list_issue_types,mcp__github__get_label,mcp__github__get_file_contents,mcp__github__list_branches,mcp__github__get_commit,mcp__github__list_commits,mcp__github__search_repositories,mcp__github__search_code,mcp__github__search_users,mcp__github__get_me,mcp__github__get_teams,mcp__github__get_team_members,mcp__github__get_latest_release,mcp__github__get_release_by_tag,mcp__github__list_releases,mcp__github__get_tag,mcp__github__list_tags"
